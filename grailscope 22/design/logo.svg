<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="gs-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#16d0a0"/>
    </linearGradient>
  </defs>
  <!-- mark: a scope / lens reading the market -->
  <g transform="translate(8,8)">
    <rect width="64" height="64" rx="18" fill="#0b1020"/>
    <circle cx="29" cy="29" r="17" fill="none" stroke="url(#gs-grad)" stroke-width="4"/>
    <!-- price tick inside the lens -->
    <path d="M20 34 L26 28 L31 32 L39 22" fill="none" stroke="url(#gs-grad)" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- scope handle -->
    <path d="M42 42 L54 54" stroke="url(#gs-grad)" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- wordmark -->
  <text x="86" y="50" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif"
        font-size="30" font-weight="800" letter-spacing="-1" fill="#0b1020">Grail<tspan fill="url(#gs-grad)">Scope</tspan></text>
  <text x="88" y="66" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif"
        font-size="10.5" font-weight="600" letter-spacing="2.5" fill="#7a8499">TRACK · TIME · TRADE FAIR</text>
</svg>
