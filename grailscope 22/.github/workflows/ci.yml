name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Typecheck core
        run: npm run typecheck --workspace @grailscope/core
      - name: Prove the live-feed pipeline (offline fixtures)
        run: node --import tsx server/scripts/demo-live-feed.ts
      - name: Build web
        run: npm run build:web
